<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Portrait illustration of Pak Yusuf, traditional fisher">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5470" />
      <stop offset="100%" stop-color="#0a1f33" />
    </linearGradient>
    <linearGradient id="pskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a06a40" />
      <stop offset="100%" stop-color="#7a4a28" />
    </linearGradient>
    <linearGradient id="pshirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6c8a" />
      <stop offset="100%" stop-color="#1e3f55" />
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="240" height="240" fill="url(#pbg)" />

  <!-- sun behind -->
  <circle cx="180" cy="70" r="30" fill="#ffb84d" opacity="0.35" />
  <circle cx="180" cy="70" r="18" fill="#ffd28a" opacity="0.6" />

  <!-- horizon line -->
  <rect y="160" width="240" height="80" fill="#0a1f33" opacity="0.45" />
  <path d="M 0 158 q 60 -8 120 0 t 120 0" stroke="#1e5470" stroke-width="1.2" fill="none" opacity="0.6" />

  <!-- shoulders / shirt -->
  <path d="M 30 240 L 30 200 Q 60 165 120 165 Q 180 165 210 200 L 210 240 Z" fill="url(#pshirt)" />
  <!-- shirt collar -->
  <path d="M 100 175 L 120 195 L 140 175" stroke="#0a1f33" stroke-width="2" fill="none" />
  <path d="M 100 175 L 90 165 M 140 175 L 150 165" stroke="#0a1f33" stroke-width="2" fill="none" />

  <!-- neck -->
  <rect x="108" y="148" width="24" height="20" fill="url(#pskin)" />
  <path d="M 106 168 q 14 6 28 0" stroke="#5a3418" stroke-width="1" fill="none" opacity="0.5" />

  <!-- head -->
  <ellipse cx="120" cy="115" rx="42" ry="48" fill="url(#pskin)" />

  <!-- hair -->
  <path d="M 80 100 Q 88 75 120 72 Q 152 75 160 100 Q 158 90 150 86 Q 140 84 130 86 Q 120 84 110 86 Q 98 84 90 90 Q 84 95 80 100 Z" fill="#1a0d05" />

  <!-- eyebrows -->
  <path d="M 95 108 q 8 -3 16 0" stroke="#1a0d05" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M 129 108 q 8 -3 16 0" stroke="#1a0d05" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- eyes (squinting from sun, weathered) -->
  <path d="M 96 120 q 8 4 16 0" stroke="#1a0d05" stroke-width="2.2" fill="none" stroke-linecap="round" />
  <path d="M 128 120 q 8 4 16 0" stroke="#1a0d05" stroke-width="2.2" fill="none" stroke-linecap="round" />

  <!-- crow's feet -->
  <path d="M 88 122 l -6 -2 M 88 124 l -6 0 M 88 126 l -6 2" stroke="#5a3418" stroke-width="1" fill="none" opacity="0.5" />
  <path d="M 152 122 l 6 -2 M 152 124 l 6 0 M 152 126 l 6 2" stroke="#5a3418" stroke-width="1" fill="none" opacity="0.5" />

  <!-- nose -->
  <path d="M 118 124 q -2 12 -4 18 q 2 4 6 4 q 4 0 6 -4 q -2 -6 -4 -18" stroke="#5a3418" stroke-width="1.5" fill="#8a5630" />

  <!-- moustache -->
  <path d="M 102 152 q 8 4 18 4 q 10 0 18 -4 q -2 -6 -8 -6 q -4 0 -10 2 q -6 -2 -10 -2 q -6 0 -8 6 Z" fill="#1a0d05" />

  <!-- mouth -->
  <path d="M 108 158 q 12 4 24 0" stroke="#3a1d0f" stroke-width="1.6" fill="none" stroke-linecap="round" />

  <!-- chin shadow / beard scruff -->
  <ellipse cx="120" cy="158" rx="22" ry="6" fill="#1a0d05" opacity="0.18" />

  <!-- forehead lines (weathered) -->
  <path d="M 92 92 q 28 -3 56 0" stroke="#3a1d0f" stroke-width="1" fill="none" opacity="0.35" />
  <path d="M 92 98 q 28 -3 56 0" stroke="#3a1d0f" stroke-width="1" fill="none" opacity="0.25" />

  <!-- earring (subtle) -->
  <circle cx="78" cy="135" r="1.6" fill="#ffb84d" />
</svg>
