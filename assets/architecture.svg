<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" role="img" aria-label="System architecture: phone offline-first runtime, cloud orchestrator, tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1f33" />
      <stop offset="100%" stop-color="#061521" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aafc4" />
    </marker>
    <marker id="arrow-sun" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb84d" />
    </marker>
  </defs>

  <rect width="920" height="480" fill="url(#bg)" rx="12" />

  <!-- ===== Phone (left) ===== -->
  <g>
    <rect x="20" y="40" width="240" height="400" rx="20" fill="#0c1d2d" stroke="#1a3a5c" stroke-width="1.5" />
    <text x="140" y="70" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.4">FISHER'S PHONE · OFFLINE-FIRST</text>

    <!-- voice -->
    <g>
      <rect x="40" y="92" width="200" height="60" rx="8" fill="#0f2a44" stroke="#1a3a5c" />
      <text x="140" y="118" text-anchor="middle" fill="#e9f0f6" font-family="ui-monospace, monospace" font-size="13" font-weight="600">voice in/out</text>
      <text x="140" y="136" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">whisper-id · TTS local</text>
    </g>

    <!-- cache -->
    <g>
      <rect x="40" y="170" width="200" height="76" rx="8" fill="#0f2a44" stroke="#1a3a5c" />
      <text x="140" y="194" text-anchor="middle" fill="#e9f0f6" font-family="ui-monospace, monospace" font-size="13" font-weight="600">on-device cache</text>
      <text x="140" y="212" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">catch history</text>
      <text x="140" y="226" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">last forecast · trip P&amp;L</text>
    </g>

    <!-- sms -->
    <g>
      <rect x="40" y="264" width="200" height="60" rx="8" fill="#0f2a44" stroke="#1a3a5c" />
      <text x="140" y="290" text-anchor="middle" fill="#ffb84d" font-family="ui-monospace, monospace" font-size="13" font-weight="600">SMS fallback</text>
      <text x="140" y="308" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">GSM gateway · always on</text>
    </g>

    <!-- internal arrows -->
    <line x1="140" y1="152" x2="140" y2="170" stroke="#9aafc4" stroke-opacity="0.5" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <line x1="140" y1="246" x2="140" y2="264" stroke="#9aafc4" stroke-opacity="0.5" stroke-dasharray="3,3" marker-end="url(#arrow)" />

    <!-- footer label -->
    <text x="140" y="420" text-anchor="middle" fill="#67c79a" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1">SOURCE OF TRUTH OFFLINE</text>
  </g>

  <!-- ===== Cloud orchestrator (right) ===== -->
  <g>
    <rect x="320" y="40" width="580" height="400" rx="14" fill="#0a1f33" stroke="#1a3a5c" stroke-width="1.5" />
    <text x="610" y="70" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.4">CLOUD ORCHESTRATOR</text>

    <!-- scheduler -->
    <g>
      <rect x="340" y="100" width="160" height="64" rx="8" fill="#0f2a44" stroke="#1a3a5c" />
      <text x="420" y="124" text-anchor="middle" fill="#e9f0f6" font-family="ui-monospace, monospace" font-size="13" font-weight="600">scheduler</text>
      <text x="420" y="142" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">cron + queue</text>
    </g>

    <!-- router -->
    <g>
      <rect x="540" y="100" width="160" height="64" rx="8" fill="#0f2a44" stroke="#1a3a5c" />
      <text x="620" y="124" text-anchor="middle" fill="#e9f0f6" font-family="ui-monospace, monospace" font-size="13" font-weight="600">router</text>
      <text x="620" y="142" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">cost-tier classifier</text>
    </g>

    <!-- cheap LLM -->
    <g>
      <rect x="740" y="80" width="140" height="48" rx="8" fill="#1f3d2e" stroke="#67c79a" />
      <text x="810" y="100" text-anchor="middle" fill="#67c79a" font-family="ui-monospace, monospace" font-size="12" font-weight="600">cheap LLM</text>
      <text x="810" y="116" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">~82% calls</text>
    </g>

    <!-- smart LLM -->
    <g>
      <rect x="740" y="140" width="140" height="48" rx="8" fill="#3d2e1f" stroke="#ffb84d" />
      <text x="810" y="160" text-anchor="middle" fill="#ffb84d" font-family="ui-monospace, monospace" font-size="12" font-weight="600">smart LLM</text>
      <text x="810" y="176" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11">~18% calls</text>
    </g>

    <!-- arrows scheduler->router->LLM -->
    <line x1="500" y1="132" x2="540" y2="132" stroke="#9aafc4" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="700" y1="124" x2="740" y2="106" stroke="#67c79a" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="700" y1="142" x2="740" y2="160" stroke="#ffb84d" stroke-width="1.5" marker-end="url(#arrow-sun)" />

    <!-- tools row -->
    <g>
      <rect x="340" y="220" width="540" height="160" rx="10" fill="#0c2235" stroke="#1a3a5c" />
      <text x="610" y="244" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.4">TOOLS</text>

      <!-- tool grid -->
      <g font-family="ui-monospace, monospace" font-size="11" fill="#e9f0f6">
        <rect x="358" y="262" width="160" height="34" rx="6" fill="#0f2a44" stroke="#1a3a5c" />
        <text x="438" y="284" text-anchor="middle">bmkg.fetchForecast</text>

        <rect x="528" y="262" width="160" height="34" rx="6" fill="#0f2a44" stroke="#1a3a5c" />
        <text x="608" y="284" text-anchor="middle">copernicus.getCurrents</text>

        <rect x="698" y="262" width="160" height="34" rx="6" fill="#0f2a44" stroke="#1a3a5c" />
        <text x="778" y="284" text-anchor="middle">tpi.scrape</text>

        <rect x="358" y="306" width="160" height="34" rx="6" fill="#0f2a44" stroke="#1a3a5c" />
        <text x="438" y="328" text-anchor="middle">sms.send</text>

        <rect x="528" y="306" width="160" height="34" rx="6" fill="#0f2a44" stroke="#1a3a5c" />
        <text x="608" y="328" text-anchor="middle">wa.draft</text>

        <rect x="698" y="306" width="160" height="34" rx="6" fill="#0f2a44" stroke="#1a3a5c" />
        <text x="778" y="328" text-anchor="middle">fuelCalc</text>

        <rect x="358" y="350" width="500" height="20" rx="4" fill="none" />
        <text x="608" y="365" text-anchor="middle" fill="#9aafc4" font-size="10" letter-spacing="0.5">+ catchHistory · koperasi.api · gps.read</text>
      </g>

      <!-- LLM -> tools arrows -->
      <line x1="810" y1="188" x2="810" y2="220" stroke="#ffb84d" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arrow-sun)" />
    </g>

    <text x="610" y="420" text-anchor="middle" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1">SYNC TARGET · NOT A HARD DEPENDENCY</text>
  </g>

  <!-- ===== Phone <-> Cloud bridges ===== -->
  <g>
    <!-- cache <-> cloud (sync when online) -->
    <line x1="240" y1="208" x2="320" y2="132" stroke="#9aafc4" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)" marker-start="url(#arrow)" />
    <text x="278" y="158" fill="#9aafc4" font-family="ui-monospace, monospace" font-size="10" font-style="italic">sync when online</text>

    <!-- sms <-> sms.send -->
    <line x1="240" y1="294" x2="358" y2="280" stroke="#ffb84d" stroke-width="1.5" marker-end="url(#arrow-sun)" marker-start="url(#arrow-sun)" />
    <text x="270" y="306" fill="#ffb84d" font-family="ui-monospace, monospace" font-size="10" font-style="italic">always-on SMS</text>
  </g>
</svg>
